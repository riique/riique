<svg xmlns="http://www.w3.org/2000/svg" width="980" height="220" viewBox="0 0 980 220" role="img" aria-label="Token-maxxing pipeline">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c4b5fd"/>
    </marker>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- background transparent for dark/light -->

  <!-- nodes -->
  <g filter="url(#soft)">
    <rect x="20" y="70" width="130" height="70" rx="12" fill="#4c1d95" stroke="#c4b5fd" stroke-width="2"/>
    <text x="85" y="112" text-anchor="middle" fill="#fff" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700">IDEIA</text>
  </g>

  <g filter="url(#soft)">
    <rect x="200" y="55" width="170" height="100" rx="12" fill="#1e3a8a" stroke="#93c5fd" stroke-width="2"/>
    <text x="285" y="95" text-anchor="middle" fill="#fff" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700">PROMPT</text>
    <text x="285" y="118" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">desnecessariamente</text>
    <text x="285" y="134" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">detalhado</text>
  </g>

  <g filter="url(#soft)">
    <rect x="420" y="55" width="160" height="100" rx="12" fill="#7f1d1d" stroke="#fca5a5" stroke-width="2"/>
    <text x="500" y="95" text-anchor="middle" fill="#fff" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700">CONTEXTO</text>
    <text x="500" y="118" text-anchor="middle" fill="#fee2e2" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">em estado</text>
    <text x="500" y="134" text-anchor="middle" fill="#fee2e2" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">crítico</text>
  </g>

  <g filter="url(#soft)">
    <rect x="630" y="55" width="160" height="100" rx="12" fill="#14532d" stroke="#86efac" stroke-width="2"/>
    <text x="710" y="95" text-anchor="middle" fill="#fff" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700">PRODUTO</text>
    <text x="710" y="118" text-anchor="middle" fill="#dcfce7" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">mais ou menos</text>
    <text x="710" y="134" text-anchor="middle" fill="#dcfce7" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">funcionando</text>
  </g>

  <g filter="url(#soft)">
    <rect x="840" y="55" width="120" height="100" rx="12" fill="#7c2d12" stroke="#fdba74" stroke-width="2"/>
    <text x="900" y="90" text-anchor="middle" fill="#fff" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700">AUMENTO</text>
    <text x="900" y="108" text-anchor="middle" fill="#fff" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700">DE ESCOPO</text>
    <text x="900" y="132" text-anchor="middle" fill="#ffedd5" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10">"já que estamos</text>
    <text x="900" y="146" text-anchor="middle" fill="#ffedd5" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10">aqui..."</text>
  </g>

  <!-- forward arrows -->
  <line x1="150" y1="105" x2="198" y2="105" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="370" y1="105" x2="418" y2="105" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="105" x2="628" y2="105" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="790" y1="105" x2="838" y2="105" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- feedback loop: E back to B -->
  <path d="M 900 155 C 900 195, 285 195, 285 155" fill="none" stroke="#c4b5fd" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrowPurple)"/>
  <text x="590" y="188" text-anchor="middle" fill="#c4b5fd" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-style="italic">mais tokens</text>
</svg>
