name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#a855f7&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#a855f7
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#a855f7

      # O snk deixa ~32px de padding acima do grid para a cobra "sair" dos blocos.
      # Cortamos esse espaço para a animação ficar encaixada no grid.
      - name: Crop snake viewBox
        run: |
          chmod -R u+w dist
          python3 << 'PY'
          from pathlib import Path
          import re
          import os

          for path in Path("dist").glob("*.svg"):
              os.chmod(path, 0o644)
              svg = path.read_text(encoding="utf-8")
              # Grid real: y de 2 a ~110, x de 0 a ~850. viewBox original: -16 -32 880 192
              svg = re.sub(
                  r'viewBox="[^"]+"',
                  'viewBox="0 0 852 116"',
                  svg,
                  count=1,
              )
              svg = re.sub(r'\bwidth="[^"]+"', 'width="852"', svg, count=1)
              svg = re.sub(r'\bheight="[^"]+"', 'height="116"', svg, count=1)
              path.write_text(svg, encoding="utf-8")
              print(f"cropped {path.name}")
          PY

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
